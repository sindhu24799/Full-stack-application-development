<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign Up | SmartCampus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card" style="max-width: 500px;">
        <div class="auth-brand text-center mb-4">
            <div class="auth-icon"><i class="fas fa-graduation-cap"></i></div>
            <h2 class="fw-bold mt-3">Create Account</h2>
            <p class="text-muted">Join the SmartCampus community</p>
        </div>

        <!-- Error -->
        <div th:if="${errorMessage}" class="alert alert-danger py-2">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        </div>

        <form th:action="@{/register-user}" method="post" id="signupForm" th:object="${user}" novalidate>
            <div class="mb-3">
                <label for="fullName" class="form-label fw-semibold">Full Name <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                    <input type="text" id="fullName" th:field="*{fullName}" class="form-control"
                           placeholder="Your full name" required/>
                </div>
                <div th:if="${#fields.hasErrors('fullName')}" class="text-danger small mt-1"
                     th:errors="*{fullName}">Error</div>
            </div>

            <div class="mb-3">
                <label for="signupUsername" class="form-label fw-semibold">Username <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="signupUsername" th:field="*{username}" class="form-control"
                           placeholder="Choose a username" required minlength="3"/>
                </div>
                <div th:if="${#fields.hasErrors('username')}" class="text-danger small mt-1"
                     th:errors="*{username}">Error</div>
            </div>

            <div class="mb-3">
                <label for="signupEmail" class="form-label fw-semibold">Email Address <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                    <input type="email" id="signupEmail" th:field="*{email}" class="form-control"
                           placeholder="your@email.com" required/>
                </div>
                <div th:if="${#fields.hasErrors('email')}" class="text-danger small mt-1"
                     th:errors="*{email}">Error</div>
            </div>

            <div class="mb-4">
                <label for="signupPassword" class="form-label fw-semibold">Password <span class="text-danger">*</span></label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="signupPassword" th:field="*{password}" class="form-control"
                           placeholder="Minimum 6 characters" required minlength="6"/>
                </div>
                <div th:if="${#fields.hasErrors('password')}" class="text-danger small mt-1"
                     th:errors="*{password}">Error</div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </button>
        </form>

        <div class="text-center mt-4">
            <p class="text-muted mb-0">Already have an account?
                <a href="/login" class="text-primary fw-semibold text-decoration-none">Login here</a>
            </p>
        </div>
        <div class="text-center mt-2">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>Back to Home
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
