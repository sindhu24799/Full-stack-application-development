<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${pageTitle} + ' | SmartCampus Admin'">Add Event</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="admin-header">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1>
                    <i class="fas fa-plus-circle me-3" th:if="${event.id == null}"></i>
                    <i class="fas fa-edit me-3" th:unless="${event.id == null}"></i>
                    <span th:text="${pageTitle}">Add Event</span>
                </h1>
                <p class="mb-0 opacity-75">
                    <span th:if="${event.id == null}">Fill in the details to create a new campus event</span>
                    <span th:unless="${event.id == null}">Update details for this event</span>
                </p>
            </div>
            <a href="/admin/events" class="btn btn-outline-light">
                <i class="fas fa-arrow-left me-2"></i>Back to Events
            </a>
        </div>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-9">
                <div class="admin-form-card">
                    <form th:action="@{/admin/events/save}" method="post" th:object="${event}" novalidate>
                        <input type="hidden" th:field="*{id}"/>

                        <div class="row g-4">
                            <!-- Title -->
                            <div class="col-12">
                                <label for="title" class="form-label fw-semibold">
                                    Event Title <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="title" th:field="*{title}"
                                       class="form-control form-control-lg"
                                       th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
                                       placeholder="e.g. Annual Tech Fest 2025" required/>
                                <div th:if="${#fields.hasErrors('title')}" class="invalid-feedback"
                                     th:errors="*{title}">Error</div>
                            </div>

                            <!-- Description -->
                            <div class="col-12">
                                <label for="description" class="form-label fw-semibold">Description</label>
                                <textarea id="description" th:field="*{description}"
                                          class="form-control" rows="4"
                                          placeholder="Provide a detailed description of the event..."></textarea>
                                <div th:if="${#fields.hasErrors('description')}" class="text-danger small mt-1"
                                     th:errors="*{description}">Error</div>
                            </div>

                            <!-- Department & Type -->
                            <div class="col-md-6">
                                <label for="department" class="form-label fw-semibold">
                                    Department <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="department" th:field="*{department}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('department')} ? 'is-invalid' : ''"
                                       placeholder="e.g. Computer Science" required/>
                                <div th:if="${#fields.hasErrors('department')}" class="invalid-feedback"
                                     th:errors="*{department}">Error</div>
                            </div>

                            <div class="col-md-6">
                                <label for="type" class="form-label fw-semibold">
                                    Event Type <span class="text-danger">*</span>
                                </label>
                                <select id="type" th:field="*{type}" class="form-select"
                                        th:classappend="${#fields.hasErrors('type')} ? 'is-invalid' : ''"
                                        required>
                                    <option value="">-- Select Type --</option>
                                    <option value="Workshop">Workshop</option>
                                    <option value="Seminar">Seminar</option>
                                    <option value="Festival">Festival</option>
                                    <option value="Cultural">Cultural</option>
                                    <option value="Sports">Sports</option>
                                    <option value="Technical">Technical</option>
                                    <option value="Webinar">Webinar</option>
                                    <option value="Competition">Competition</option>
                                    <option value="Other">Other</option>
                                </select>
                                <div th:if="${#fields.hasErrors('type')}" class="invalid-feedback"
                                     th:errors="*{type}">Error</div>
                            </div>

                            <!-- Date & Venue -->
                            <div class="col-md-6">
                                <label for="date" class="form-label fw-semibold">
                                    Event Date <span class="text-danger">*</span>
                                </label>
                                <input type="date" id="date" th:field="*{date}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('date')} ? 'is-invalid' : ''"
                                       required/>
                                <div th:if="${#fields.hasErrors('date')}" class="invalid-feedback"
                                     th:errors="*{date}">Error</div>
                            </div>

                            <div class="col-md-6">
                                <label for="venue" class="form-label fw-semibold">
                                    Venue <span class="text-danger">*</span>
                                </label>
                                <input type="text" id="venue" th:field="*{venue}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('venue')} ? 'is-invalid' : ''"
                                       placeholder="e.g. Main Auditorium" required/>
                                <div th:if="${#fields.hasErrors('venue')}" class="invalid-feedback"
                                     th:errors="*{venue}">Error</div>
                            </div>

                            <!-- Capacity & Status -->
                            <div class="col-md-6">
                                <label for="capacity" class="form-label fw-semibold">
                                    Capacity <span class="text-danger">*</span>
                                </label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-users"></i></span>
                                    <input type="number" id="capacity" th:field="*{capacity}"
                                           class="form-control"
                                           th:classappend="${#fields.hasErrors('capacity')} ? 'is-invalid' : ''"
                                           placeholder="e.g. 100" min="1" required/>
                                    <div th:if="${#fields.hasErrors('capacity')}" class="invalid-feedback"
                                         th:errors="*{capacity}">Error</div>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="status" class="form-label fw-semibold">Status</label>
                                <select id="status" th:field="*{status}" class="form-select">
                                    <option value="UPCOMING">Upcoming</option>
                                    <option value="ONGOING">Ongoing</option>
                                    <option value="COMPLETED">Completed</option>
                                    <option value="CANCELLED">Cancelled</option>
                                </select>
                            </div>

                            <!-- Submit -->
                            <div class="col-12 d-flex gap-3 pt-2">
                                <button type="submit" class="btn btn-primary btn-lg px-5 fw-semibold">
                                    <i class="fas fa-save me-2"></i>
                                    <span th:text="${event.id == null ? 'Create Event' : 'Update Event'}">Save</span>
                                </button>
                                <a href="/admin/events" class="btn btn-outline-secondary btn-lg px-4">
                                    Cancel
                                </a>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
