<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | SmartCampus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card">
        <!-- Brand -->
        <div class="auth-brand text-center mb-4">
            <div class="auth-icon"><i class="fas fa-graduation-cap"></i></div>
            <h2 class="fw-bold mt-3">SmartCampus</h2>
            <p class="text-muted">Event Management System</p>
        </div>

        <h4 class="fw-bold text-center mb-4">Welcome Back</h4>

        <!-- Alerts -->
        <div th:if="${successMessage}" class="alert alert-success py-2" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger py-2" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
        </div>

        <!-- Login Form -->
        <form th:action="@{/login}" method="post" id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label fw-semibold">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" id="username" name="username" class="form-control form-control-lg"
                           placeholder="Enter your username" required autofocus/>
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" id="password" name="password" class="form-control form-control-lg"
                           placeholder="Enter your password" required/>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePassword()">
                        <i class="fas fa-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">
                <i class="fas fa-sign-in-alt me-2"></i>Login
            </button>
        </form>

        <div class="auth-divider my-4"><span>OR</span></div>

        <div class="text-center">
            <p class="text-muted mb-3">Don't have an account?</p>
            <a href="/signup" class="btn btn-outline-primary w-100 btn-lg">
                <i class="fas fa-user-plus me-2"></i>Create Account
            </a>
        </div>

        <!-- Demo Credentials Box -->
        <div class="demo-creds mt-4">
            <p class="fw-semibold mb-2"><i class="fas fa-info-circle me-2 text-primary"></i>Demo Credentials</p>
            <div class="d-flex justify-content-between">
                <div>
                    <small class="text-muted d-block">Admin</small>
                    <code>admin / admin123</code>
                </div>
                <div>
                    <small class="text-muted d-block">Student</small>
                    <code>student / student123</code>
                </div>
            </div>
        </div>

        <div class="text-center mt-3">
            <a href="/" class="text-muted small text-decoration-none">
                <i class="fas fa-arrow-left me-1"></i>Back to Home
            </a>
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        pwd.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
