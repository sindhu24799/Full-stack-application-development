<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Registrations | SmartCampus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<section class="page-header">
    <div class="container">
        <h1><i class="fas fa-ticket-alt me-3"></i>My Registrations</h1>
        <p class="mb-0 opacity-75">All events you have registered for</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">

        <!-- Email search -->
        <div class="filter-bar mb-4">
            <form method="get" action="/my-events" class="row g-3 align-items-end">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Look up your registrations by email</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                        <input type="email" name="email" class="form-control form-control-lg"
                               placeholder="Enter your email address..." th:value="${email}"/>
                    </div>
                </div>
                <div class="col-md-3">
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="fas fa-search me-2"></i>Search
                    </button>
                </div>
            </form>
        </div>

        <!-- Results -->
        <div th:if="${!#lists.isEmpty(registrations)}">
            <p class="text-muted mb-4">
                Found <strong th:text="${#lists.size(registrations)}">0</strong> registration(s)
                for <strong th:text="${email}">email</strong>
            </p>

            <div class="row g-4">
                <div th:each="reg : ${registrations}" class="col-md-6 col-lg-4">
                    <div class="myevent-card">
                        <div class="myevent-badge" th:text="${reg.event.type}">Type</div>
                        <h5 class="fw-bold mb-2" th:text="${reg.event.title}">Event</h5>
                        <div class="myevent-meta">
                            <div><i class="fas fa-user me-2 text-primary"></i><span th:text="${reg.studentName}">Name</span></div>
                            <div><i class="fas fa-envelope me-2 text-primary"></i><span th:text="${reg.email}">Email</span></div>
                            <div th:if="${reg.phone}"><i class="fas fa-phone me-2 text-primary"></i><span th:text="${reg.phone}">Phone</span></div>
                            <div><i class="fas fa-calendar me-2 text-primary"></i>
                                <span th:text="${#temporals.format(reg.event.date, 'dd MMM yyyy')}">Date</span>
                            </div>
                            <div><i class="fas fa-map-marker-alt me-2 text-primary"></i>
                                <span th:text="${reg.event.venue}">Venue</span>
                            </div>
                            <div><i class="fas fa-building me-2 text-primary"></i>
                                <span th:text="${reg.event.department}">Dept</span>
                            </div>
                        </div>
                        <div class="mt-3 pt-3 border-top">
                            <a th:href="@{/events/{id}(id=${reg.event.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-external-link-alt me-1"></i>View Event
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(registrations)}" class="empty-state text-center py-5">
            <i class="fas fa-calendar-times fa-4x text-muted mb-4"></i>
            <h4 class="text-muted" th:if="${email}">No registrations found for this email.</h4>
            <h4 class="text-muted" th:unless="${email}">Enter your email to see your registrations.</h4>
            <a href="/events" class="btn btn-primary mt-3">
                <i class="fas fa-search me-2"></i>Browse Events
            </a>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
