<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error | SmartCampus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-body">
<div class="auth-wrapper">
    <div class="auth-card text-center">
        <div class="error-code" th:text="${errorCode ?: '500'}">500</div>
        <div class="error-icon mb-3">
            <i class="fas fa-exclamation-triangle fa-3x text-warning"></i>
        </div>
        <h3 class="fw-bold" th:text="${errorTitle ?: 'Oops! Something went wrong'}">Error</h3>
        <p class="text-muted" th:text="${errorMessage ?: 'An unexpected error occurred. Please try again.'}">Message</p>
        <div class="d-flex gap-3 justify-content-center mt-4">
            <a href="/" class="btn btn-primary">
                <i class="fas fa-home me-2"></i>Go Home
            </a>
            <a href="/events" class="btn btn-outline-primary">
                <i class="fas fa-calendar me-2"></i>Browse Events
            </a>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
