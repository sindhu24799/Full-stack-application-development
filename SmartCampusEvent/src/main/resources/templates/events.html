<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>All Events | SmartCampus</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Page Header -->
<section class="page-header">
    <div class="container">
        <h1><i class="fas fa-calendar-alt me-3"></i>Campus Events</h1>
        <p class="mb-0 opacity-75">Browse and register for upcoming events across all departments</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">

        <!-- Flash Messages -->
        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="fas fa-check-circle me-2"></i><span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="fas fa-exclamation-circle me-2"></i><span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter Bar -->
        <div class="filter-bar mb-5">
            <form method="get" action="/events" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Filter by Department</label>
                    <select name="department" class="form-select" onchange="this.form.submit()">
                        <option value="">All Departments</option>
                        <option th:each="dept : ${departments}"
                                th:value="${dept}"
                                th:text="${dept}"
                                th:selected="${selectedDepartment == dept}">Dept</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Filter by Type</label>
                    <select name="type" class="form-select" onchange="this.form.submit()">
                        <option value="">All Types</option>
                        <option th:each="t : ${types}"
                                th:value="${t}"
                                th:text="${t}"
                                th:selected="${selectedType == t}">Type</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <a href="/events" class="btn btn-outline-secondary w-100">
                        <i class="fas fa-times me-2"></i>Clear Filters
                    </a>
                </div>
            </form>
        </div>

        <!-- Results count -->
        <p class="text-muted mb-4">
            Showing <strong th:text="${#lists.size(events)}">0</strong> event(s)
        </p>

        <!-- Event Cards Grid -->
        <div class="row g-4">
            <div th:each="event : ${events}" class="col-md-6 col-xl-4">
                <div class="event-card h-100">
                    <div class="event-card-header">
                        <span class="event-type-badge" th:text="${event.type}">Type</span>
                        <span class="event-status-badge" th:classappend="${event.full ? 'full' : ''}">
                            <i class="fas fa-circle me-1" style="font-size:8px"></i>
                            <span th:text="${event.full ? 'Full' : 'Open'}">Open</span>
                        </span>
                    </div>
                    <div class="event-card-body">
                        <div class="event-dept mb-2">
                            <i class="fas fa-building me-1"></i>
                            <span th:text="${event.department}">Dept</span>
                        </div>
                        <h5 class="event-title" th:text="${event.title}">Title</h5>
                        <p class="event-desc" th:text="${event.description}">Description</p>
                        <div class="event-meta">
                            <div class="meta-item">
                                <i class="fas fa-calendar-day"></i>
                                <span th:text="${#temporals.format(event.date, 'dd MMM yyyy')}">Date</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-map-marker-alt"></i>
                                <span th:text="${event.venue}">Venue</span>
                            </div>
                            <div class="meta-item">
                                <i class="fas fa-users"></i>
                                <span th:text="${event.availableSeats} + ' / ' + ${event.capacity} + ' seats'">Seats</span>
                            </div>
                        </div>
                    </div>
                    <div class="event-card-footer">
                        <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-event-view">
                            <i class="fas fa-eye me-2"></i>View & Register
                        </a>
                    </div>
                </div>
            </div>

            <!-- Empty State -->
            <div th:if="${#lists.isEmpty(events)}" class="col-12">
                <div class="empty-state text-center py-5">
                    <i class="fas fa-search fa-4x text-muted mb-4"></i>
                    <h4 class="text-muted">No events found</h4>
                    <p class="text-muted">Try changing your filters or check back later.</p>
                    <a href="/events" class="btn btn-primary mt-2">Clear Filters</a>
                </div>
            </div>
        </div>
    </div>
</section>

<div th:replace="~{fragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
